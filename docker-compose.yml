networks:
  default:
    external: true
    name: agent_network
services:
  db:
    image: pgvector/pgvector:pg15
    container_name: synergereader-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synergereader
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    container_name: synergereader-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
  backend:
    build:
      context: ./synerge-reader-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./synerge-reader-backend:/app
      - chroma_data:/app/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - DB_CONNECTION_STRING=postgresql://postgres:postgres@db:5432/synergereader
      - EMAIL_KEY=${EMAIL_KEY}
    depends_on:
      - db
      - ollama
    restart: unless-stopped
  frontend:
    build:
      context: ./synerge-reader-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    volumes:
      - ./synerge-reader-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
volumes:
  chroma_data:
  db_data:
  ollama_data:
